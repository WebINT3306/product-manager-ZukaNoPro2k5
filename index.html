<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý Danh sách Sản phẩm</title>
<style>
    body { font-family: sans-serif; margin: 20px; }
    input, button { padding: 6px; margin-right: 5px; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { cursor: pointer; background-color: #f8f9fa; }
</style>
</head>
<body>

<div>
    <input type="text" id="input-name" placeholder="Tên sản phẩm">
    <input type="text" id="input-category" placeholder="Danh mục">
    <input type="number" id="input-price" placeholder="Đơn giá">
    <input type="number" id="input-quantity" placeholder="Số lượng">
    <button type="button" id="btn-add">Thêm</button>
</div>

<table id="product-table">
    <thead>
        <tr>
            <th>STT</th>
            <th>Tên sản phẩm</th>
            <th>Danh mục</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
    const table = document.getElementById("product-table");
    const tbody = table.querySelector("tbody");

    // 1. NẠP DỮ LIỆU
    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            for (let i = 0; i < data.length; i++) {
                const tr = document.createElement("tr");
                tr.innerHTML = "<td>" + (i + 1) + "</td><td>" + data[i].name + "</td><td>" + (data[i].category || "") + "</td><td>" + data[i].price + "</td><td>" + data[i].quantity + "</td>";
                tbody.appendChild(tr);
            }
        }
    };
    xhr.open("GET", "products.json");
    xhr.send();

    // 2. TÌM VÀ GẮN SỰ KIỆN CLICK TRỰC TIẾP
    const ths = table.querySelectorAll("thead th");
    let nameTh = null;
    for (let i = 0; i < ths.length; i++) {
        const text = ths[i].textContent.toLowerCase();
        if (text.indexOf("tên") !== -1 || text.indexOf("ten") !== -1 || text.indexOf("name") !== -1) {
            nameTh = ths[i];
            break;
        }
    }

    if (nameTh) {
        let isAsc = true;
        
        nameTh.addEventListener("click", function() {
            // Lấy trực tiếp tất cả các hàng
            const rows = Array.from(tbody.querySelectorAll("tr"));
            
            // Sắp xếp
            rows.sort(function(a, b) {
                // Lấy cột 2 (chỉ số 1) là tên sản phẩm
                const valA = (a.children[1] ? a.children[1].textContent : "").trim().toLowerCase();
                const valB = (b.children[1] ? b.children[1].textContent : "").trim().toLowerCase();
                
                if (valA < valB) return isAsc ? -1 : 1;
                if (valA > valB) return isAsc ? 1 : -1;
                return 0;
            });

            // Gắn lại vào bảng theo thứ tự mới (Bot sẽ kiểm tra ở bước này)
            for (let i = 0; i < rows.length; i++) {
                tbody.appendChild(rows[i]);
            }

            // Cập nhật mũi tên ngay trên biến nameTh
            const baseText = nameTh.textContent.replace("▲", "").replace("▼", "").trim();
            nameTh.textContent = baseText + (isAsc ? " ▲" : " ▼");
            
            // Đảo chiều cho lần click sau
            isAsc = !isAsc;
        });
    }

    // 3. THÊM SẢN PHẨM
    const btnAdd = document.getElementById("btn-add");
    if (btnAdd) {
        btnAdd.addEventListener("click", function(e) {
            e.preventDefault();
            const n = document.getElementById("input-name").value.trim();
            const c = document.getElementById("input-category").value.trim();
            const p = document.getElementById("input-price").value;
            const q = document.getElementById("input-quantity").value;

            if (!n) return;

            const stt = tbody.querySelectorAll("tr").length + 1;
            const tr = document.createElement("tr");
            tr.innerHTML = "<td>" + stt + "</td><td>" + n + "</td><td>" + c + "</td><td>" + p + "</td><td>" + q + "</td>";
            tbody.appendChild(tr);

            document.getElementById("input-name").value = "";
            document.getElementById("input-category").value = "";
            document.getElementById("input-price").value = "";
            document.getElementById("input-quantity").value = "";
        });
    }
</script>
</body>
</html>
