<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh sách Sản phẩm</title>
    <style>
        /* CSS Cơ bản & Yêu cầu khuyến khích (4.4) */
        body {
            font-family: Arial, sans-serif;
            margin: 20px auto;
            max-width: 900px;
            color: #333;
        }

        .form-container {
            background-color: #f8f9fa;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .form-container input {
            padding: 8px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        #error-msg {
            color: #dc3545;
            font-size: 0.9em;
            margin-top: 10px;
        }

        
        
        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #dee2e6;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #e9ecef;
        }

   
        .sortable {
            cursor: pointer;
            user-select: none;
        }

        .sortable:hover {
            background-color: #d6d8db;
        }

        /* 4.4 Khuyến khích: Màu nền xen kẽ (Zebra striping) và Hover */
        tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tbody tr:hover {
            background-color: #e2e6ea;
        }
    </style>
</head>
<body>

    <h2>Thêm Sản Phẩm Mới</h2>
    <div class="form-container">
        <input type="text" id="input-name" placeholder="Tên sản phẩm (*)">
        <input type="text" id="input-category" placeholder="Danh mục">
        <input type="number" id="input-price" placeholder="Đơn giá (*)">
        <input type="number" id="input-quantity" placeholder="Số lượng (*)">
        <button id="btn-add">Thêm sản phẩm</button>
        <div id="error-msg"></div>
    </div>

    <h2>Danh Sách Sản Phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th class="sortable" id="sort-name-header">Tên sản phẩm <span id="sort-icon"></span></th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody id="product-tbody">
            </tbody>
    </table>

    <script>
        // Trạng thái (State) của ứng dụng
        let products = [];
        let isAscending = true; // Theo dõi trạng thái sắp xếp
        let currentMaxId = 0;   // Dùng để tạo ID tự tăng cho sản phẩm mới

        // 4.1 Nạp dữ liệu qua AJAX (XMLHttpRequest)
        function loadProducts() {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    products = JSON.parse(xhr.responseText);
                    
                    // Tìm ID lớn nhất hiện tại để cấp cho sản phẩm mới thêm vào
                    products.forEach(p => {
                        if (p.id > currentMaxId) currentMaxId = p.id;
                    });
                    
                    renderTable();
                }
            };
            xhr.open('GET', 'products.json');
            xhr.send();
        }

        // Hàm vẽ lại bảng dựa trên mảng products
        function renderTable() {
            const tbody = document.getElementById('product-tbody');
            tbody.innerHTML = ''; // Xóa sạch dữ liệu cũ trước khi vẽ lại

            products.forEach((product, index) => {
                const tr = document.createElement('tr');
                
                // Định dạng tiền tệ VNĐ (tùy chọn nhưng giúp UI đẹp hơn)
                const formattedPrice = Number(product.price).toLocaleString('vi-VN') + ' đ';

                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${product.name}</td>
                    <td>${product.category || ''}</td>
                    <td>${formattedPrice}</td>
                    <td>${product.quantity}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 4.2 Sắp xếp bảng
        document.getElementById('sort-name-header').addEventListener('click', function() {
            // Sắp xếp mảng products
            products.sort((a, b) => {
                const nameA = a.name.toLowerCase();
                const nameB = b.name.toLowerCase();
                
                if (nameA < nameB) return isAscending ? -1 : 1;
                if (nameA > nameB) return isAscending ? 1 : -1;
                return 0;
            });

            // Cập nhật biểu tượng mũi tên
            const icon = document.getElementById('sort-icon');
            icon.textContent = isAscending ? '▲' : '▼';

            // Đảo chiều sắp xếp cho lần click tiếp theo
            isAscending = !isAscending;

            // Render lại bảng sau khi đã sort
            renderTable();
        });

        // 4.3 Thêm sản phẩm
        document.getElementById('btn-add').addEventListener('click', function() {
            // Lấy các DOM elements
            const inputName = document.getElementById('input-name');
            const inputCategory = document.getElementById('input-category');
            const inputPrice = document.getElementById('input-price');
            const inputQuantity = document.getElementById('input-quantity');
            const errorMsg = document.getElementById('error-msg');

            // Lấy giá trị
            const name = inputName.value.trim();
            const category = inputCategory.value.trim();
            const price = parseFloat(inputPrice.value);
            const quantity = parseInt(inputQuantity.value, 10);

            // Validation tối thiểu
            if (name.length < 3) {
                errorMsg.textContent = 'Lỗi: Tên sản phẩm không được rỗng và phải có ít nhất 3 ký tự.';
                return;
            }
            if (isNaN(price) || price <= 0) {
                errorMsg.textContent = 'Lỗi: Đơn giá phải là một số dương.';
                return;
            }
            if (isNaN(quantity) || quantity < 1) {
                errorMsg.textContent = 'Lỗi: Số lượng phải là số nguyên ≥ 1.';
                return;
            }

            // Nếu vượt qua validation, xóa thông báo lỗi
            errorMsg.textContent = '';
            
            // Tăng ID
            currentMaxId++;

            // Tạo object sản phẩm mới
            const newProduct = {
                id: currentMaxId,
                name: name,
                category: category,
                price: price,
                quantity: quantity
            };

            // Thêm vào mảng và vẽ lại bảng (không reload trang)
            products.push(newProduct);
            renderTable();

            // Reset các ô nhập về rỗng
            inputName.value = '';
            inputCategory.value = '';
            inputPrice.value = '';
            inputQuantity.value = '';
        });

        // Khởi chạy ứng dụng: Nạp dữ liệu khi DOM đã sẵn sàng
        window.onload = loadProducts;
    </script>
</body>
</html>
