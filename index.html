<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Danh sách Sản phẩm</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .form-group { margin-bottom: 20px; }
        input, button { padding: 8px; margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 10px; text-align: left; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <div class="form-group">
        <input type="text" id="input-name" placeholder="Tên sản phẩm">
        <input type="text" id="input-category" placeholder="Danh mục">
        <input type="number" id="input-price" placeholder="Đơn giá">
        <input type="number" id="input-quantity" placeholder="Số lượng">
        <button id="btn-add">Thêm sản phẩm</button>
    </div>

    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        const table = document.getElementById('product-table');
        const tbody = table.querySelector('tbody');

        const xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                const products = JSON.parse(xhr.responseText);
                products.forEach((product, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${product.name}</td>
                        <td>${product.category || ''}</td>
                        <td>${product.price}</td>
                        <td>${product.quantity}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        };
        xhr.open('GET', 'products.json');
        xhr.send();

        const ths = table.querySelectorAll('thead th');
        let nameHeader = null;
        ths.forEach(th => {
            const text = th.textContent.toLowerCase();
            if (text.includes('tên') || text.includes('ten') || text.includes('name')) {
                nameHeader = th;
            }
        });

        let isAscending = true;
        if (nameHeader) {
            nameHeader.style.cursor = 'pointer';
            nameHeader.addEventListener('click', function() {
                const rows = Array.from(tbody.querySelectorAll('tr'));
                
                rows.sort((a, b) => {
                    const nameA = a.children[1].textContent.trim().toLowerCase();
                    const nameB = b.children[1].textContent.trim().toLowerCase();
                    if (nameA < nameB) return isAscending ? -1 : 1;
                    if (nameA > nameB) return isAscending ? 1 : -1;
                    return 0;
                });

                rows.forEach(row => tbody.appendChild(row));

                Array.from(tbody.querySelectorAll('tr')).forEach((row, index) => {
                    row.children[0].textContent = index + 1;
                });

                let baseText = nameHeader.textContent.replace('▲', '').replace('▼', '').trim();
                nameHeader.textContent = baseText + (isAscending ? ' ▲' : ' ▼');
                isAscending = !isAscending;
            });
        }

        document.getElementById('btn-add').addEventListener('click', function() {
            const inputName = document.getElementById('input-name');
            const inputCategory = document.getElementById('input-category');
            const inputPrice = document.getElementById('input-price');
            const inputQuantity = document.getElementById('input-quantity');

            const name = inputName.value.trim();
            const category = inputCategory.value.trim();
            const price = inputPrice.value;
            const quantity = inputQuantity.value;

            if (name.length < 3) return;
            if (Number(price) <= 0) return;
            if (Number(quantity) < 1 || !Number.isInteger(Number(quantity))) return;

            const stt = tbody.querySelectorAll('tr').length + 1;
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td>${stt}</td>
                <td>${name}</td>
                <td>${category}</td>
                <td>${price}</td>
                <td>${quantity}</td>
            `;
            tbody.appendChild(tr);

            inputName.value = '';
            inputCategory.value = '';
            inputPrice.value = '';
            inputQuantity.value = '';
        });
    </script>
</body>
</html>
