<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý Danh sách Sản phẩm</title>
<style>
    body { font-family: sans-serif; margin: 20px; }
    input, button { padding: 6px; margin-right: 5px; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { cursor: pointer; background-color: #f8f9fa; }
</style>
</head>
<body>

<div>
    <input type="text" id="input-name" placeholder="Tên sản phẩm">
    <input type="text" id="input-category" placeholder="Danh mục">
    <input type="number" id="input-price" placeholder="Đơn giá">
    <input type="number" id="input-quantity" placeholder="Số lượng">
    <button type="button" id="btn-add">Thêm</button>
</div>

<table id="product-table">
    <thead>
        <tr>
            <th>STT</th>
            <th>Tên sản phẩm</th>
            <th>Danh mục</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
        </tr>
    </thead>
    <tbody id="product-tbody">
    </tbody>
</table>

<script>
    var products = [];
    var sortAsc = true;

    var table = document.getElementById("product-table");
    var tbody = document.getElementById("product-tbody");

    // Re-render all rows from the products array
    function renderTable() {
        tbody.innerHTML = '';
        for (var i = 0; i < products.length; i++) {
            var tr = document.createElement("tr");
            tr.innerHTML =
                "<td>" + (i + 1) + "</td>" +
                "<td>" + products[i].name + "</td>" +
                "<td>" + (products[i].category || "") + "</td>" +
                "<td>" + products[i].price + "</td>" +
                "<td>" + products[i].quantity + "</td>";
            tbody.appendChild(tr);
        }
    }

    // 1. Load initial data from products.json
    try {
        var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                for (var i = 0; i < data.length; i++) {
                    products.push({
                        name:     data[i].name     || "",
                        category: data[i].category || "",
                        price:    data[i].price    || "",
                        quantity: data[i].quantity || ""
                    });
                }
                renderTable();
            }
        };
        xhr.open("GET", "products.json");
        xhr.send();
    } catch (e) {}

    // 2. Sort by name when clicking the "Tên sản phẩm" header
    var ths = table.querySelectorAll("thead th");
    var nameTh = null;
    for (var i = 0; i < ths.length; i++) {
        var txt = ths[i].textContent.toLowerCase();
        if (txt.indexOf("tên") !== -1 || txt.indexOf("ten") !== -1 || txt.indexOf("name") !== -1) {
            nameTh = ths[i];
            break;
        }
    }

    if (nameTh) {
        nameTh.addEventListener("click", function () {
            // Sort the data array — never touch DOM rows directly
            products.sort(function (a, b) {
                var na = (a.name || "").trim().toLowerCase();
                var nb = (b.name || "").trim().toLowerCase();
                if (na < nb) return sortAsc ? -1 : 1;
                if (na > nb) return sortAsc ? 1 : -1;
                return 0;
            });

            // Update sort indicator before flipping flag
            var baseText = nameTh.textContent.replace("▲", "").replace("▼", "").trim();
            nameTh.textContent = baseText + (sortAsc ? " ▲" : " ▼");

            sortAsc = !sortAsc;

            renderTable();
        });
    }

    // 3. Add a new product
    var btnAdd = document.getElementById("btn-add");
    if (btnAdd) {
        btnAdd.addEventListener("click", function (e) {
            e.preventDefault();
            var n = document.getElementById("input-name").value.trim();
            var c = document.getElementById("input-category").value.trim();
            var p = document.getElementById("input-price").value;
            var q = document.getElementById("input-quantity").value;

            if (!n) return;

            products.push({ name: n, category: c, price: p, quantity: q });
            renderTable();

            document.getElementById("input-name").value    = "";
            document.getElementById("input-category").value = "";
            document.getElementById("input-price").value   = "";
            document.getElementById("input-quantity").value = "";
        });
    }
</script>
</body>
</html>
